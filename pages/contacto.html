<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="../index.html">IronForge</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="clases.html">Clases</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div class="row justify-content-center align-items-center g-5">
      
      <div class="col-lg-5">
        <h2 class="display-5 fw-bold mb-4 text-dark">¿LISTO PARA EL <span class="text-danger">CAMBIO?</span></h2>
        <p class="lead mb-4">Déjanos tus datos y un coach se pondrá en contacto contigo para armar tu plan personalizado.</p>
        <ul class="list-unstyled">
          <li class="mb-3">📍20 Calle 22-84 Zona 10 Guatemala </li>
          <li class="mb-3">📞 +502 45660368</li>
          <li class="mb-3">✉️ info@ironforge.com</li>
        </ul>
      </div>

      <div class="col-lg-6">
        <div class="card shadow-lg border-0 rounded-4 p-4">
          <form>
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre Completo</label>
              <input type="text" class="form-control" placeholder="Tu nombre aquí">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Correo Electrónico</label>
              <input type="email" class="form-control" placeholder="nombre@correo.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">¿Qué disciplina te interesa?</label>
              <select class="form-select">
                <option selected disabled>Selecciona una opción</option>
                <option value="boxeo">Boxeo</option>
                <option value="crossfit">CrossFit</option>
                <option value="yoga">Yoga</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Mensaje (Opcional)</label>
              <textarea class="form-control" rows="3" placeholder="Cuéntanos tus metas..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 text-uppercase shadow-sm" style="background-color: #ff4500; border: none;">Enviar Mensaje</button>
          </form>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer-fitness py-4 text-center">
    <div class="container">
      <p class="mb-0 text-white">&copy; 2026 IronForge Fitness - Entrega 3 CoderHouse</p>
    </div>
  </footer>
